<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Untuk Zella 🌸</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(180deg,#ffe8f1,#ffd6e7,#fff5f8);
}

h1{
    color:#d45c8a;
    margin-bottom:25px;
}

#board{
    width:330px;
    display:grid;
    grid-template-columns:repeat(3,110px);
    gap:5px;
}

.piece{
    width:110px;
    height:150px;
    border-radius:10px;
    cursor:grab;
}

#message{
    margin-top:30px;
    color:#d45c8a;
    font-size:22px;
    text-align:center;
}
</style>
</head>

<body>

<h1>Hmm... ini foto apa ya? 🤔</h1>

<div id="board">
<img src="tile_1_2.jpg" class="piece" draggable="true">
<img src="tile_0_0.jpg" class="piece" draggable="true">
<img src="tile_2_1.jpg" class="piece" draggable="true">

<img src="tile_0_1.jpg" class="piece" draggable="true">
<img src="tile_2_2.jpg" class="piece" draggable="true">
<img src="tile_1_0.jpg" class="piece" draggable="true">

<img src="tile_1_1.jpg" class="piece" draggable="true">
<img src="tile_2_0.jpg" class="piece" draggable="true">
<img src="tile_0_2.jpg" class="piece" draggable="true">
</div>

<br>

<button onclick="finishPuzzle()">
✨ Puzzle Selesai
</button>

<div id="message"></div>

<script>

function finishPuzzle(){

document.getElementById("message").innerHTML=
`
<br>
✨ Wowww, ternyata foto kita berdua 🥺❤️
<br><br>
Karena bestie ulang tahun, jadi ini ucapan dariku 🌸
`;

setTimeout(function(){
    window.location.href="letter.html";
},4000);

}

</script>

</body>
</html>
