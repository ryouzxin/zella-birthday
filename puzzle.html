<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puzzle Untuk Zella 🌸</title>

<style>

body{
    margin:0;
    padding:20px;
    min-height:100vh;
    background:linear-gradient(180deg,#fff0f5,#ffe4ec,#fff8fb);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    box-sizing:border-box;
}

h1{
    color:#d45c8a;
    font-size:24px;
    text-align:center;
    margin-bottom:25px;
}

#board{
    width:100%;
    max-width:360px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.piece{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

.selected{
    outline:4px solid #ff7fb3;
    transform:scale(1.05);
}

#message{
    margin-top:25px;
    text-align:center;
    color:#d45c8a;
}

#message h2{
    margin-bottom:10px;
}

</style>
</head>

<body>

<h1>🧩 Hmm... ini foto apa ya? 🤔</h1>

<div id="board">

<img src="puzzle_7.jpg" class="piece">
<img src="puzzle_1.jpg" class="piece">
<img src="puzzle_10.jpg" class="piece">

<img src="puzzle_2.jpg" class="piece">
<img src="puzzle_12.jpg" class="piece">
<img src="puzzle_5.jpg" class="piece">

<img src="puzzle_8.jpg" class="piece">
<img src="puzzle_3.jpg" class="piece">
<img src="puzzle_11.jpg" class="piece">

<img src="puzzle_4.jpg" class="piece">
<img src="puzzle_9.jpg" class="piece">
<img src="puzzle_6.jpg" class="piece">

</div>

<div id="message"></div>

<script>

const pieces = document.querySelectorAll(".piece");

let firstPiece = null;

pieces.forEach(piece => {

    piece.addEventListener("click", function(){

        if(firstPiece === null){

            firstPiece = this;

            this.classList.add("selected");

        }else{

            let temp = firstPiece.src;

            firstPiece.src = this.src;

            this.src = temp;

            firstPiece.classList.remove("selected");

            firstPiece = null;

            checkPuzzle();

        }

    });

});

function checkPuzzle(){

    const correctOrder = [
        "puzzle_1.jpg",
        "puzzle_2.jpg",
        "puzzle_3.jpg",
        "puzzle_4.jpg",
        "puzzle_5.jpg",
        "puzzle_6.jpg",
        "puzzle_7.jpg",
        "puzzle_8.jpg",
        "puzzle_9.jpg",
        "puzzle_10.jpg",
        "puzzle_11.jpg",
        "puzzle_12.jpg"
    ];

    let solved = true;

    pieces.forEach((piece,index)=>{

        if(!piece.src.includes(correctOrder[index])){
            solved = false;
        }

    });

    if(solved){

        document.getElementById("message").innerHTML = `
            <h2>🥺 Ternyata itu foto kita berdua ❤️</h2>
            <p>Karena bestie ulang tahun, jadi ini ucapan dariku 🌸</p>
        `;

        setTimeout(()=>{
            window.location.href="letter.html";
        },4000);

    }

}

</script>

</body>
</html>
