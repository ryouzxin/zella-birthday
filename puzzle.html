<script>

const pieces = document.querySelectorAll(".piece");
let firstPiece = null;

pieces.forEach(piece => {

    piece.addEventListener("click", function(){

        if(firstPiece === null){

            firstPiece = this;
            this.classList.add("selected");

        }else{

            const temp = firstPiece.src;

            firstPiece.src = this.src;
            this.src = temp;

            firstPiece.classList.remove("selected");
            firstPiece = null;

            checkPuzzle();
        }
    });

});

function checkPuzzle(){

    const correctOrder = [
        "puzzle_1.jpg",
        "puzzle_2.jpg",
        "puzzle_3.jpg",
        "puzzle_4.jpg",
        "puzzle_5.jpg",
        "puzzle_6.jpg",
        "puzzle_7.jpg",
        "puzzle_8.jpg",
        "puzzle_9.jpg",
        "puzzle_10.jpg",
        "puzzle_11.jpg",
        "puzzle_12.jpg"
    ];

    let solved = true;

    pieces.forEach((piece,index)=>{

        if(!piece.src.includes(correctOrder[index])){
            solved = false;
        }

    });

    if(solved){

        document.getElementById("board").innerHTML = `
            <img src="photobaru.jpg.jpeg" id="finalPhoto">
        `;

        document.getElementById("message").innerHTML = `
            <h2>🥺 Ternyata itu foto kita berdua ❤️</h2>
        `;

        setTimeout(()=>{
            window.location.href = "letter.html";
        },5000);

    }

}

</script>
